name: Update Review Dashboard
on:
  schedule:
    - cron: '*/30 * * * *' # Every half hour
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dashboard-automation
      - name: Generate Dashboard
        env:
          GH_TOKEN: ${{ secrets.TRIAGE_PAT }}
        run: python3 scripts/triage/generate_dashboard.py
      - name: Commit and Push
        run: |
          git config user.name "Review Dashboard Bot"
          git config user.email "bot@google.com"
          git add triage/HELP_ISSUES_TRIAGE.md triage/TEAM_STATS.md
          git commit -m "chore: update review dashboard [skip ci]" || exit 0
          git push
