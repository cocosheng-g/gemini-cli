name: Generate Daily Metrics
on:
  schedule:
    - cron: '0 0 * * *' # Midnight UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dashboard-automation
      - name: Generate Metrics
        env:
          GH_TOKEN: ${{ secrets.TRIAGE_PAT }}
        run: python3 scripts/triage/generate_metrics.py
      - name: Commit and Push
        run: |
          git config user.name "Metrics Dashboard Bot"
          git config user.email "bot@google.com"
          git add triage/CONTRIBUTION_METRICS.md
          git commit -m "chore: generate daily contribution metrics [skip ci]" || exit 0
          git push
